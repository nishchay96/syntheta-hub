<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Demo</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { 
            margin: 0; padding: 0; 
            background: var(--bg); color: var(--text-primary); 
            font-family: sans-serif; height: 100vh; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden; 
        }
        .controls { 
            position: absolute; bottom: 50px; 
            display: flex; gap: 12px; z-index: 100; 
            flex-wrap: wrap; justify-content: center; 
        }
        button { 
            padding: 12px 24px; border-radius: 50px; 
            border: 1px solid var(--border); 
            background: var(--bg-glass); color: var(--text-primary); 
            cursor: pointer; backdrop-filter: blur(10px); 
            transition: 0.2s; font-weight: 600; font-size: 0.9rem;
        }
        button:hover { 
            background: var(--bg-glass-hov); 
            transform: translateY(-2px); 
            border-color: var(--border-glow);
        }
        .demo-title {
            position: absolute; top: 40px; 
            font-size: 1.2rem; font-weight: 800; letter-spacing: 0.2em;
            color: var(--text-secondary);
        }
    </style>
</head>
<body class="theme-dark">

    <div class="demo-title">SYNTHETA ORB PHYSICS ENGINE</div>

    <!-- Ambient Glow Matching the App -->
    <div class="bg-ambient">
        <div class="glow glow-blue"></div>
        <div class="glow glow-purple"></div>
        <div class="glow glow-teal"></div>
    </div>

    <!-- The actual Orb Component HTML from index.html -->
    <div class="orb-wrapper" style="transform: scale(1.3);">
        <div class="orb state-idle" id="demo-orb">
            <div class="orb-fluid orb-fluid-1"></div>
            <div class="orb-fluid orb-fluid-2"></div>
            <div class="orb-fluid orb-fluid-3"></div>
        </div>
        <p class="orb-label" id="demo-label" style="opacity:0.6; margin-top: 40px; text-align: center;">IDLE<br><span style="font-size: 0.6rem; font-weight: 400; text-transform:none;">Static breathing loop</span></p>
    </div>

    <!-- Interactive Testing Controls -->
    <div class="controls">
        <button onclick="setState('idle', 'IDLE', 'Static breathing loop')">Idle</button>
        <button onclick="setState('processing', 'THINKING', 'Multi-color CSS animation')">Thinking</button>
        <button onclick="setState('speaking', 'SPEAKING', 'Live JavaScript Rhythm Envelope')">Speaking (Demo Rhythm)</button>
        <button onclick="document.body.classList.toggle('theme-light'); document.body.classList.toggle('theme-dark');">🌗 Toggle Theme</button>
    </div>

    <script>
        // Inline replica of the exact requestAnimationFrame simulator built in app.js
        // This makes the demo perfectly standalone without needing the WebSocket backend!
        const orb = document.getElementById('demo-orb');
        const label = document.getElementById('demo-label');
        
        let currentState = 'idle';
        let animationFrameId = null;
        let currentVolume = 0;
        let targetVolume = 0;

        function startVibration() {
            if (animationFrameId) return;
            
            const tick = () => {
                if (currentState !== 'speaking') {
                    orb.style.transform = '';
                    orb.style.boxShadow = '';
                    animationFrameId = null;
                    return;
                }
                
                // ── JS RHYTHM SIMULATOR MATH ──
                // Smoothly interpolate to the simulated audio energy target
                currentVolume += (targetVolume - currentVolume) * 0.15;
                
                // Randomly change energy bounds to simulate vocal syllables and pauses
                if (Math.random() < 0.12) {
                    targetVolume = Math.random() * 0.8 + 0.2; // Syllable burst
                } else if (Math.random() < 0.05) {
                    targetVolume = 0; // Micro-pause
                }
                
                // Apply chaotic organic scale and subpixel translation
                const scale = 1.05 + (currentVolume * 0.15); 
                const x = (Math.random() - 0.5) * currentVolume * 8;
                const y = (Math.random() - 0.5) * currentVolume * 8;
                
                orb.style.transform = `scale(${scale}) translate(${x}px, ${y}px) translateZ(0)`;
                
                // Dynamically pulse the glow based on the exact same audio energy
                const shadowSize = 40 + currentVolume * 80;
                const shadowAlpha = 0.4 + currentVolume * 0.6;
                orb.style.boxShadow = `0 0 ${shadowSize}px rgba(52,217,154,${shadowAlpha})`;

                animationFrameId = requestAnimationFrame(tick);
            };
            tick();
        }

        function setState(state, title, desc) {
            currentState = state;
            orb.className = `orb state-${state}`;
            label.innerHTML = `${title}<br><span style="font-size: 0.6rem; font-weight: 400; text-transform:none;">${desc}</span>`;

            if (state === 'speaking') {
                startVibration();
            } else {
                orb.style.transform = '';
                orb.style.boxShadow = '';
            }
        }
    </script>
</body>
</html>
